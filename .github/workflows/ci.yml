name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run build
      - name: Start PostgreSQL 17
        run: |
          docker run --detach --rm \
            --name postgres-mcp-ci \
            --publish 127.0.0.1:55432:5432 \
            --env POSTGRES_PASSWORD=postgres \
            postgres:17-alpine \
            -c shared_preload_libraries=pg_stat_statements \
            -c compute_query_id=on
          for attempt in $(seq 1 60); do
            docker exec postgres-mcp-ci pg_isready -U postgres && exit 0
            sleep 1
          done
          docker logs postgres-mcp-ci
          exit 1
      - name: Run MCP end-to-end tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:55432/postgres
        run: npm run test:e2e
      - name: Stop PostgreSQL
        if: always()
        run: docker rm -f postgres-mcp-ci || true
      - run: npm audit --omit=dev
      - run: npm pack --dry-run

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build rootless runtime image
        run: docker build --tag postgres-mcp-server:test .
